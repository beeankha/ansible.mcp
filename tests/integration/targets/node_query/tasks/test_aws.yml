---
- name: List IAM groups
  ansible.mcp.run_tool:
    name: list_groups
    args:
      max_items: 10
  no_log: true
  register: iam_tool_result

- name: Run jq query on MCP result
  ansible.builtin.set_fact:
    transformed_node: "{{ iam_tool_result | to_json | node_jq(event_node_queries.run_tool) }}"

- name: Validate MCP event transformation
  ansible.builtin.assert:
    that:
      - transformed_node == expected_run_tool_result
    fail_msg: |
      Transformation failed. 
      Result: {{ transformed_node | to_nice_json }}
      Expected: {{ expected_run_tool_result | to_nice_json }}
  vars:
    expected_run_tool_result:
      - canonical_facts:
          server_name: "awslabs.iam-mcp-server"
          tool_name: "list_groups"
        facts:
          device_type: "resource"
          infra_bucket: "mcp"

- name: Get Server Info
  ansible.mcp.server_info:
  register: iam_server_info

- name: Run jq query on Server Info result
  ansible.builtin.set_fact:
    transformed_server_info: "{{ iam_server_info | to_json | node_jq(event_node_queries.server_info) }}"

- name: Validate server_info event transformation
  ansible.builtin.assert:
    that:
      - transformed_server_info == expected_server_info_result
    fail_msg: |
      Transformation failed for server_info.
      Actual: {{ transformed_server_info | to_nice_json }}
      Expected: {{ expected_server_info_result | to_nice_json }}
  vars:
    expected_server_info_result:
      - canonical_facts:
          server_name: "awslabs.iam-mcp-server"
        facts:
          device_type: "server"
          infra_bucket: "mcp"

- name: Get Tools Info
  ansible.mcp.tools_info:
  register: iam_tools_info

- name: Run jq query on Tools Info result
  ansible.builtin.set_fact:
    transformed_tools: "{{ iam_tools_info | to_json | node_jq(event_node_queries.tools_info) }}"

- name: Validate tools_info event transformation
  ansible.builtin.assert:
    that:
      - expected_tool in transformed_tools
    fail_msg: |
      Comparison failed. 
      Looking for: {{ expected_tool | to_json }}
      In: {{ transformed_tools | to_json }}
  vars:
    expected_tool:
      canonical_facts:
        server_name: "awslabs.iam-mcp-server"
        tool_name: "list_groups"
      facts:
        device_type: "tool"
        infra_bucket: "mcp"
